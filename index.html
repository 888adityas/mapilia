<!-- hero typing effect -->
<div class="container">
    <style>
        @-webkit-keyframes blink {
            0% {
                opacity: 1;
            }
    
            50% {
                opacity: 0;
            }
    
            100% {
                opacity: 1;
            }
        }
    </style>
    <script>
        $('#typed').typing();
        $("#typed2").typing({
            strings: ['Spreading happiness', 'Connecting People', 'Creating Memories', 'Creating Stories', 'Fullfilling Adventure'],
            eraseDelay: 60,
            typeDelay: 70,
            stringStartDelay: 1000,
            color: 'white',
            typingColor: 'white',
            typingOpacity: '0.1',
            loopCount: 100,
            cursorBlink: true,
            cursorChar: '<small>|</small>',
            fade: false,
